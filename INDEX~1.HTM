<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Buzz·In — Live Jeopardy Buzzer</title>
<style>
  :root{
    --bg:#070b22; --panel:#0d1336; --panel-line:#283065; --panel2:#10184a;
    --ink:#f4f6ff; --mute:#8c95c4; --faint:#5a6190;
    --blue:#3d6fe0; --gold:#e8b923; --green:#1d9e55; --red:#c0392b;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{min-height:100vh; display:flex; flex-direction:column; align-items:center;}
  .wrap{width:100%; max-width:680px; padding:20px 16px 60px; margin:0 auto;}
  .screen{display:none;} .screen.active{display:block;}
  h1.logo{font-size:32px; font-weight:600; letter-spacing:1px; text-align:center; margin:18px 0 2px; color:var(--gold);}
  h1.logo .dot{color:var(--blue);}
  .tag{font-size:13px; color:var(--mute); text-align:center; margin-bottom:26px;}
  label{font-size:12px; color:var(--mute); display:block; margin-bottom:5px;}
  input{width:100%; background:var(--panel); border:1px solid var(--panel-line); border-radius:8px;
    padding:11px 12px; color:var(--ink); font-size:15px; outline:none;}
  input:focus{border-color:var(--blue);}
  input::placeholder{color:var(--faint);}
  .field{margin-bottom:16px;}
  .btn{display:block; width:100%; border:none; border-radius:8px; padding:12px; font-size:15px;
    font-weight:600; cursor:pointer; text-align:center;}
  .btn-blue{background:var(--blue); color:#fff;}
  .btn-gold{background:var(--gold); color:#070b22;}
  .btn-ghost{background:transparent; border:1px solid var(--gold); color:var(--gold);}
  .btn-line{background:transparent; border:1px solid var(--panel-line); color:var(--ink);}
  .btn:active{transform:scale(.985);}
  .card{background:var(--bg); border:1px solid #1a2150; border-radius:14px; padding:22px;}
  .or{text-align:center; font-size:12px; color:var(--faint); margin:12px 0;}
  .row{display:flex; gap:8px;}
  .err{color:#ff8a8a; font-size:13px; min-height:18px; text-align:center; margin-top:10px;}
  .center{max-width:320px; margin:0 auto;}

  /* lobby header */
  .lobhead{display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--mute); margin-bottom:18px;}
  .lobhead .code{color:var(--gold); letter-spacing:2px; font-weight:600;}

  /* buzzer */
  .buzzwrap{text-align:center; margin:10px 0 6px;}
  .buzzer{width:190px; height:190px; border-radius:50%; margin:0 auto; background:var(--blue);
    border:6px solid var(--gold); color:#fff; font-size:30px; font-weight:700; letter-spacing:1px;
    cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none;
    transition:transform .05s, background .15s;}
  .buzzer:active{transform:scale(.95);}
  .buzzer.locked{background:#1c2350; border-color:#3a4488; color:#6b73a0; cursor:not-allowed;}
  .buzzer.first{background:var(--gold); border-color:#fff; color:#070b22;}
  .buzzmsg{margin-top:14px; font-size:15px; min-height:20px; color:var(--gold); font-weight:600;}

  /* scoreboard */
  .grid{display:grid; gap:8px; margin-top:22px;}
  .pcard{background:var(--panel); border:1px solid var(--panel-line); border-radius:8px; padding:10px; text-align:center;}
  .pcard.lead{background:var(--panel2); border:2px solid var(--gold);}
  .pcard .pn{font-size:13px; color:#cdd3f5; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pcard .ps{font-size:19px; font-weight:600; margin-top:2px;}
  .pcard.lead .ps{color:var(--gold);}
  .pcard .pr{font-size:10px; color:var(--faint); margin-top:2px;}
  .pcard.lead .pr{color:var(--gold);}

  /* host panel */
  .panel-box{background:var(--bg); border:1px solid #1a2150; border-radius:14px; padding:20px; margin-top:18px;}
  .panel-title{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .panel-title .ttl{font-size:15px; font-weight:600;}
  .hostbadge{font-size:11px; color:var(--gold); border:1px solid var(--gold); border-radius:10px; padding:1px 8px; margin-left:6px;}
  .qval{display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid var(--panel-line);
    border-radius:8px; padding:8px 12px; margin-bottom:12px;}
  .qval span{font-size:12px; color:var(--mute);}
  .qval input{width:90px; margin-left:auto; text-align:right; color:var(--gold); font-weight:600; padding:6px 8px;}
  .hint{font-size:12px; color:var(--mute); margin:6px 0 8px;}
  .hrow{display:flex; align-items:center; gap:7px; background:var(--panel); border:1px solid var(--panel-line);
    border-radius:8px; padding:8px 10px;}
  .hrow.lead{background:var(--panel2); border:2px solid var(--gold);}
  .hrow .hn{flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .hrow .hn small{color:var(--gold); font-size:10px;}
  .hrow .hs{font-size:14px; font-weight:600; width:50px; text-align:right;}
  .mini{border:none; border-radius:6px; padding:5px 11px; font-weight:700; cursor:pointer; color:#fff; font-size:14px;}
  .mini.plus{background:var(--green);} .mini.minus{background:var(--red);}
  .mini.kick{background:transparent; color:#6b73a0; padding:5px 6px;}
  .ctrl-row{display:flex; gap:8px; margin-bottom:12px;}
  .ctrl-row .btn{flex:1; padding:10px; font-size:14px;}
  .slider-box{margin:14px 0 4px;}
  .slider-box .lab{font-size:12px; color:var(--mute); margin-bottom:8px;}
  .slider-box .lab b{color:var(--gold);}
  input[type=range]{-webkit-appearance:none; width:100%; height:6px; border-radius:3px; background:var(--panel);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--gold); cursor:pointer;}
  input[type=range]::-moz-range-thumb{width:20px; height:20px; border:none; border-radius:50%; background:var(--gold); cursor:pointer;}
  .share{font-size:12px; color:var(--mute); text-align:center; margin-top:14px;}
  .share b{color:var(--gold); letter-spacing:1px;}
  .copy{color:var(--blue); cursor:pointer; margin-left:6px;}
  .leave{display:block; text-align:center; color:var(--faint); font-size:13px; margin-top:22px; cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ MENU ============ -->
  <div id="s-menu" class="screen active">
    <h1 class="logo">BUZZ<span class="dot">·</span>IN</h1>
    <div class="tag">live jeopardy buzzer</div>
    <div class="center">
      <div class="field">
        <label>Your name</label>
        <input id="m-name" maxlength="20" placeholder="Enter your name" />
      </div>
      <div class="field">
        <label>Lobby code</label>
        <div class="row">
          <input id="m-code" maxlength="4" placeholder="ABCD" style="text-transform:uppercase; letter-spacing:3px;" />
          <button class="btn btn-blue" style="width:auto; padding:11px 20px;" onclick="doJoin()">Join</button>
        </div>
      </div>
      <div class="or">— or —</div>
      <button class="btn btn-ghost" onclick="showCreate()">Create a lobby</button>
      <div class="err" id="m-err"></div>
    </div>
  </div>

  <!-- ============ CREATE ============ -->
  <div id="s-create" class="screen">
    <h1 class="logo">BUZZ<span class="dot">·</span>IN</h1>
    <div class="tag">create a lobby</div>
    <div class="center">
      <div class="field">
        <label>Lobby name (just for you)</label>
        <input id="c-lname" maxlength="30" placeholder="Friday Night Trivia" />
      </div>
      <div class="field">
        <label>Your name (you'll be the host)</label>
        <input id="c-name" maxlength="20" placeholder="Enter your name" />
      </div>
      <div class="field">
        <label>Password (optional)</label>
        <input id="c-pass" maxlength="30" placeholder="Leave blank for open lobby" />
      </div>
      <div class="slider-box">
        <div class="lab">Max players · <b id="c-maxlab">6</b></div>
        <input type="range" id="c-max" min="1" max="8" step="1" value="6" oninput="document.getElementById('c-maxlab').textContent=this.value" />
      </div>
      <button class="btn btn-gold" style="margin-top:18px;" onclick="doCreate()">Create &amp; enter as host</button>
      <div class="btn btn-line" style="margin-top:10px;" onclick="showMenu()">Back</div>
      <div class="err" id="c-err"></div>
    </div>
  </div>

  <!-- ============ LOBBY ============ -->
  <div id="s-lobby" class="screen">
    <div class="lobhead">
      <span>Lobby <span class="code" id="l-code">----</span></span>
      <span id="l-count">0 players</span>
    </div>

    <div class="card">
      <div class="buzzwrap">
        <div class="buzzer" id="buzzer" onclick="doBuzz()">BUZZ</div>
        <div class="buzzmsg" id="buzzmsg"></div>
      </div>
      <div class="grid" id="scoreboard"></div>
    </div>

    <!-- host-only panel -->
    <div class="panel-box" id="hostpanel" style="display:none;">
      <div class="panel-title">
        <span class="ttl">Host controls <span class="hostbadge">HOST</span></span>
      </div>

      <div class="ctrl-row">
        <button class="btn btn-blue" onclick="sock.emit('openBuzzers')">Open / reset buzzers</button>
        <button class="btn btn-line" id="lockbtn" onclick="sock.emit('lockBuzzers')">Lock</button>
      </div>

      <div class="qval">
        <span>Question value $</span>
        <input id="qval" type="number" step="50" value="200" onchange="sock.emit('setQuestionValue', this.value)" />
      </div>

      <div class="hint">Tap + or − to add/subtract the question value from a player. ⤬ kicks them.</div>
      <div class="grid" id="hostlist" style="margin-top:0;"></div>

      <div class="slider-box">
        <div class="lab">Max players · <b id="h-maxlab">6</b></div>
        <input type="range" id="h-max" min="1" max="8" step="1" value="6"
          oninput="document.getElementById('h-maxlab').textContent=this.value"
          onchange="sock.emit('setMaxPlayers', this.value)" />
      </div>

      <div class="share" id="shareline"></div>
    </div>

    <div class="leave" onclick="doLeave()">Leave lobby</div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const sock = io();
  let me = null;        // my socket id
  let state = null;     // latest lobby state
  let amHost = false;

  // ---- navigation ----
  function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
  function showMenu(){ show('s-menu'); }
  function showCreate(){ show('s-create'); }

  // ---- menu actions ----
  function doJoin(){
    const name = document.getElementById('m-name').value.trim();
    const code = document.getElementById('m-code').value.trim().toUpperCase();
    const err = document.getElementById('m-err');
    if(!name){ err.textContent = 'Enter your name first.'; return; }
    if(!code){ err.textContent = 'Enter a lobby code.'; return; }
    let password = '';
    proceedJoin(code, name, password, err);
  }
  function proceedJoin(code, name, password, err){
    sock.emit('joinLobby', {code, name, password}, (res)=>{
      if(!res.ok){
        if(res.error === 'Wrong password.'){
          const p = prompt('This lobby is password protected. Enter password:');
          if(p === null) return;
          return proceedJoin(code, name, p.trim(), err);
        }
        err.textContent = res.error; return;
      }
      me = res.you; enterLobby();
    });
  }

  function doCreate(){
    const name = document.getElementById('c-name').value.trim();
    const err = document.getElementById('c-err');
    if(!name){ err.textContent = 'Enter your name first.'; return; }
    const password = document.getElementById('c-pass').value.trim();
    const maxPlayers = document.getElementById('c-max').value;
    sock.emit('createLobby', {name, password, maxPlayers}, (res)=>{
      if(!res.ok){ err.textContent = 'Could not create lobby.'; return; }
      me = res.you; enterLobby();
    });
  }

  function enterLobby(){ show('s-lobby'); }

  function doBuzz(){ sock.emit('buzz'); }
  function doLeave(){ sock.emit('leaveLobby'); location.reload(); }

  // ---- host score controls ----
  function adjust(id, sign){
    const v = (state ? state.questionValue : 0) * sign;
    sock.emit('adjustScore', {playerId:id, delta:v});
  }
  function kick(id){ if(confirm('Kick this player?')) sock.emit('kickPlayer', id); }

  // ---- render ----
  sock.on('lobbyState', (s)=>{
    state = s;
    amHost = (s.hostId === me);
    render();
  });
  sock.on('kicked', ()=>{ alert('You were removed from the lobby.'); location.reload(); });
  sock.on('disconnect', ()=>{});

  function ordinal(n){ const x=['1st','2nd','3rd','4th','5th','6th','7th','8th']; return x[n] || (n+1)+'th'; }

  function render(){
    if(!state) return;
    document.getElementById('l-code').textContent = state.code;
    document.getElementById('l-count').textContent = state.players.length + (state.players.length===1?' player':' players');

    // buzzer
    const buzzer = document.getElementById('buzzer');
    const msg = document.getElementById('buzzmsg');
    const firstId = state.buzzOrder[0];
    const iBuzzedFirst = firstId === me;
    buzzer.classList.remove('locked','first');
    if(!state.buzzersOpen){
      buzzer.classList.add('locked'); buzzer.textContent='LOCKED';
    } else if(iBuzzedFirst){
      buzzer.classList.add('first'); buzzer.textContent='YOU!';
    } else {
      buzzer.textContent='BUZZ';
    }
    if(firstId){
      const fp = state.players.find(p=>p.id===firstId);
      msg.textContent = (fp ? fp.name : 'Someone') + ' buzzed first!';
    } else {
      msg.textContent = state.buzzersOpen ? '' : 'Buzzers locked';
    }

    // scoreboard (everyone sees)
    const sb = document.getElementById('scoreboard');
    const n = state.players.length;
    sb.style.gridTemplateColumns = 'repeat(' + Math.min(4, Math.max(2,n)) + ', 1fr)';
    sb.innerHTML = '';
    state.players.forEach((p, idx)=>{
      const lead = p.buzzPos === 0;
      const div = document.createElement('div');
      div.className = 'pcard' + (lead?' lead':'');
      const rank = lead ? '1st' : (p.buzzPos>0 ? ordinal(p.buzzPos) : '');
      div.innerHTML = '<div class="pn">'+esc(p.name)+(p.id===me?' (you)':'')+'</div>'+
                      '<div class="ps">'+p.score+'</div>'+
                      '<div class="pr">'+rank+'</div>';
      sb.appendChild(div);
    });

    // host panel
    const hp = document.getElementById('hostpanel');
    if(amHost){
      hp.style.display='block';
      document.getElementById('lockbtn').textContent = state.buzzersOpen ? 'Lock' : 'Locked';
      // keep qval/max synced without clobbering active typing
      const qv = document.getElementById('qval');
      if(document.activeElement !== qv) qv.value = state.questionValue;
      const hmax = document.getElementById('h-max');
      if(document.activeElement !== hmax){ hmax.value = state.maxPlayers; document.getElementById('h-maxlab').textContent = state.maxPlayers; }
      hmax.min = Math.max(1, state.players.length);

      const hl = document.getElementById('hostlist');
      hl.style.gridTemplateColumns = '1fr';
      hl.innerHTML='';
      // host list ordered: buzzed-first up top, then by score
      const ordered = state.players.slice().sort((a,b)=>{
        const ap = a.buzzPos<0?99:a.buzzPos, bp = b.buzzPos<0?99:b.buzzPos;
        if(ap!==bp) return ap-bp; return b.score-a.score;
      });
      ordered.forEach(p=>{
        const lead = p.buzzPos===0;
        const row = document.createElement('div');
        row.className='hrow'+(lead?' lead':'');
        const tag = lead?' <small>· buzzed 1st</small>':'';
        const isHostRow = p.id===state.hostId;
        row.innerHTML = '<span class="hn">'+esc(p.name)+(isHostRow?' <small style="color:var(--mute)">· host</small>':'')+tag+'</span>'+
          '<span class="hs">'+p.score+'</span>'+
          '<button class="mini plus" title="+ value">+</button>'+
          '<button class="mini minus" title="- value">−</button>'+
          (isHostRow?'<span style="width:24px"></span>':'<button class="mini kick" title="kick">⤬</button>');
        const btns = row.querySelectorAll('button');
        btns[0].onclick=()=>adjust(p.id, 1);
        btns[1].onclick=()=>adjust(p.id, -1);
        if(!isHostRow && btns[2]) btns[2].onclick=()=>kick(p.id);
        hl.appendChild(row);
      });

      const share = document.getElementById('shareline');
      share.innerHTML = 'Share this code: <b>'+state.code+'</b>'+
        (state.hasPassword?(' · password: <b>'+esc(state.password)+'</b>'):'')+
        ' <span class="copy" onclick="copyCode()">copy</span>';
    } else {
      hp.style.display='none';
    }
  }

  function copyCode(){ if(state){ navigator.clipboard && navigator.clipboard.writeText(state.code); } }
  function esc(s){ return (s+'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // submit on Enter in menu
  document.getElementById('m-code').addEventListener('keydown', e=>{ if(e.key==='Enter') doJoin(); });
  document.getElementById('m-name').addEventListener('keydown', e=>{ if(e.key==='Enter') doJoin(); });
</script>
</body>
</html>
